name: Automate Plugin Release

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Get Plugin Version
        id: get_version
        shell: powershell
        run: |
          # Find the csproj dynamically and extract the version string
          $csproj = Get-ChildItem -Recurse -Filter "*.csproj" | Select-Object -First 1
          [xml]$manifest = Get-Content $csproj.FullName
          $version = $manifest.Project.PropertyGroup.Version
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Check if Release Exists
        id: check_release
        shell: powershell
        run: |
          $tag = "v${{ steps.get_version.outputs.VERSION }}"
          $releaseExists = gh release list --limit 100 | Select-String -Pattern $tag
          if ($releaseExists) {
            echo "EXISTS=true" >> $env:GITHUB_OUTPUT
          } else {
            echo "EXISTS=false" >> $env:GITHUB_OUTPUT
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Mock Dalamud Environment
        if: steps.check_release.outputs.EXISTS == 'false'
        shell: powershell
        run: |
          # 1. Create the exact path the SDK is looking for
          $targetDir = "$env:AppData\XIVLauncher\addon\Hooks\dev"
          New-Item -ItemType Directory -Force -Path $targetDir
          
          # 2. Download the official Dalamud release binaries
          Invoke-WebRequest -Uri "https://goatcorp.github.io/dalamud-distrib/latest.zip" -OutFile "dalamud.zip"
          
          # 3. Unpack the assemblies directly into the target dev folder
          Expand-Archive -Force -Path "dalamud.zip" -DestinationPath $targetDir

      - name: Build Project
        if: steps.check_release.outputs.EXISTS == 'false'
        run: dotnet build -c Release

      - name: Create and Upload GitHub Release
        if: steps.check_release.outputs.EXISTS == 'false'
        shell: powershell
        run: |
          $tag = "v${{ steps.get_version.outputs.VERSION }}"
          
          # DalamudPackager places the clean zip (latest.zip) inside your output bin folder
          $zipFile = Get-ChildItem -Recurse -Filter "latest.zip" | Select-Object -First 1
          
          if ($zipFile) {
              # Rename it to Prepull.zip for clarity if you prefer, or upload as latest.zip
              Copy-Item $zipFile.FullName -Destination ".\Prepull.zip"
              
              # Draft and publish the GitHub release attaching the zip file
              gh release create $tag ".\Prepull.zip" --title "Release $tag" --notes "Automated build for version $tag"
          } else {
              Write-Error "Could not find the packaged plugin zip file in the output directories."
              exit 1
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
