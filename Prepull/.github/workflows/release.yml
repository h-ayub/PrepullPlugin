name: Automate Plugin Release

on:
  push:
    branches:
      - main # Triggers whenever you push or merge into main

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest # Windows is required for Dalamud compilation tools

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x' # Matches your net10.0 TargetFramework

      # Extracts the version number directly from your .csproj file
      - name: Get Version from CSPROJ
        id: get_version
        shell: powershell
        run: |
          [xml]$csproj = Get-Content (Get-ChildItem *.csproj | Select-Object -First 1)
          $version = $csproj.Project.PropertyGroup.Version
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      # Checks GitHub to see if a release with this version already exists
      - name: Check if Release Exists
        id: check_release
        shell: powershell
        run: |
          $tag = "v${{ steps.get_version.outputs.VERSION }}"
          $exists = gh release view $tag 2>&1
          if ($exists -match "release not found") {
            echo "EXISTS=false" >> $env:GITHUB_OUTPUT
          } else {
            echo "EXISTS=true" >> $env:GITHUB_OUTPUT
            echo "Version $tag already released. Skipping deployment."
          }
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Compiles the project and runs DalamudPackager to zip the output
      - name: Build and Package Plugin
        if: steps.check_release.outputs.EXISTS == 'false'
        run: dotnet build -c Release

      # Locates the packed zip inside your output directory
      - name: Locate Artifacts
        if: steps.check_release.outputs.EXISTS == 'false'
        id: locate_zip
        shell: powershell
        run: |
          $zipFile = Get-ChildItem -Path .\bin\Release\ -Filter *.zip -Recurse | Select-Object -First 1
          if ($zipFile) {
              echo "ZIP_PATH=$($zipFile.FullName)" >> $env:GITHUB_OUTPUT
              echo "Found plugin zip at: $($zipFile.FullName)"
          } else {
              echo "Error: Packed zip file not found!"
              exit 1
          }

      # Automatically cuts the Git tag and publishes the GitHub release with your asset
      - name: Create GitHub Release
        if: steps.check_release.outputs.EXISTS == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: v${{ steps.get_version.outputs.VERSION }}
          files: ${{ steps.locate_zip.outputs.ZIP_PATH }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
